services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-zflow}
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "work_mem=4MB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      zflow-internal:
        aliases:
          - zflow-db
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      zflow-internal:
        aliases:
          - zflow-redis
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${REGISTRY:-}zflow-backend:${TAG:-latest}
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 7563
      BACKEND_URL: https://${DOMAIN}
      FRONTEND_URL: https://${DOMAIN}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEEDS: ${RUN_SEEDS:-false}
      POSTGRES_HOST: zflow-db
      POSTGRES_USER: ${POSTGRES_USER:-zflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-zflow}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      REDIS_HOST: zflow-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      USER_LIMIT: ${USER_LIMIT:-10}
      CONNECTIONS_LIMIT: ${CONNECTIONS_LIMIT:-5}
      MIN_SLEEP_BUSINESS_HOURS: ${MIN_SLEEP_BUSINESS_HOURS:-1000}
      MAX_SLEEP_BUSINESS_HOURS: ${MAX_SLEEP_BUSINESS_HOURS:-3000}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-}
      META_CONFIG_ID: ${META_CONFIG_ID:-}
    volumes:
      - backend_uploads:/app/uploads
      - backend_public:/app/public
      - backend_logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - IdevaNet
      - zflow-internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
      labels:
        # API routes - strip /api prefix and forward to backend
        - "traefik.enable=true"
        - "traefik.http.routers.zflow-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
        - "traefik.http.routers.zflow-api.entrypoints=websecure"
        - "traefik.http.routers.zflow-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.zflow-api.priority=20"
        - "traefik.http.middlewares.zflow-strip-api.stripprefix.prefixes=/api"
        - "traefik.http.routers.zflow-api.middlewares=zflow-strip-api"
        - "traefik.http.services.zflow-api.loadbalancer.server.port=7563"
        # Socket.IO - WebSocket support
        - "traefik.http.routers.zflow-ws.rule=Host(`${DOMAIN}`) && PathPrefix(`/socket.io`)"
        - "traefik.http.routers.zflow-ws.entrypoints=websecure"
        - "traefik.http.routers.zflow-ws.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.zflow-ws.priority=20"
        - "traefik.http.routers.zflow-ws.service=zflow-api"
        # Webhook - direct to backend
        - "traefik.http.routers.zflow-webhook.rule=Host(`${DOMAIN}`) && PathPrefix(`/webhook`)"
        - "traefik.http.routers.zflow-webhook.entrypoints=websecure"
        - "traefik.http.routers.zflow-webhook.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.zflow-webhook.priority=20"
        - "traefik.http.routers.zflow-webhook.service=zflow-api"
        # Health check - direct to backend
        - "traefik.http.routers.zflow-health.rule=Host(`${DOMAIN}`) && Path(`/health`)"
        - "traefik.http.routers.zflow-health.entrypoints=websecure"
        - "traefik.http.routers.zflow-health.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.zflow-health.priority=20"
        - "traefik.http.routers.zflow-health.service=zflow-api"
        # Public files (uploads/media) - direct to backend
        - "traefik.http.routers.zflow-public.rule=Host(`${DOMAIN}`) && PathPrefix(`/public`)"
        - "traefik.http.routers.zflow-public.entrypoints=websecure"
        - "traefik.http.routers.zflow-public.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.zflow-public.priority=20"
        - "traefik.http.routers.zflow-public.service=zflow-api"
        # Bull Board dashboard
        - "traefik.http.routers.zflow-admin.rule=Host(`${DOMAIN}`) && PathPrefix(`/admin/queues`)"
        - "traefik.http.routers.zflow-admin.entrypoints=websecure"
        - "traefik.http.routers.zflow-admin.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.zflow-admin.priority=20"
        - "traefik.http.routers.zflow-admin.service=zflow-api"

  frontend:
    image: ${REGISTRY:-}zflow-frontend:${TAG:-latest}
    build:
      context: ./frontend
      args:
        VITE_META_APP_ID: ${META_APP_ID:-}
        VITE_META_CONFIG_ID: ${META_CONFIG_ID:-}
    networks:
      - IdevaNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      labels:
        # SPA fallback - lowest priority, catches all other routes
        - "traefik.enable=true"
        - "traefik.http.routers.zflow.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.zflow.entrypoints=websecure"
        - "traefik.http.routers.zflow.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.zflow.priority=10"
        - "traefik.http.services.zflow.loadbalancer.server.port=8080"
        - "traefik.http.middlewares.zflow-headers.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.zflow-headers.headers.stsIncludeSubdomains=true"
        - "traefik.http.middlewares.zflow-headers.headers.frameDeny=true"
        - "traefik.http.middlewares.zflow-headers.headers.contentTypeNosniff=true"
        - "traefik.http.routers.zflow.middlewares=zflow-headers"

networks:
  IdevaNet:
    external: true
  zflow-internal:
    driver: overlay

volumes:
  postgres_data:
    external: true
    name: zflow_postgres_data
  redis_data:
    external: true
    name: zflow_redis_data
  backend_uploads:
    external: true
    name: zflow_backend_uploads
  backend_public:
    external: true
    name: zflow_backend_public
  backend_logs:
    external: true
    name: zflow_backend_logs
